# ===========================================
# Model Configuration
# ===========================================
models:
  primary: claude-sonnet-4-20250514
  embedding: text-embedding-3-small
  fallback: gpt-4o-mini

# ===========================================
# Graph Configuration (NetworkX)
# ===========================================
graph:
  path: ${GRAPH_PATH:-.cache/graph.pkl}
  format: ${GRAPH_FORMAT:-pickle}
  embeddings_path: ${EMBEDDINGS_PATH:-.cache/embeddings.npz}
  similarity_threshold: 0.7

# ===========================================
# Sampling Configuration
# ===========================================
sampling:
  min_steps: 2
  max_steps: 5
  semantic_threshold: 0.7
  max_start_candidates: 10
  max_neighbors: 10

# ===========================================
# Quality Configuration
# ===========================================
quality:
  min_score: 3.5
  max_retries: 3
  require_multi_tool: true

# ===========================================
# Generation Configuration
# ===========================================
generation:
  default_count: 100
  parallel_workers: 4

# ===========================================
# Cache Configuration
# ===========================================
cache:
  enabled: ${CACHE_ENABLED:-true}
  directory: ${CACHE_DIR:-.cache}
